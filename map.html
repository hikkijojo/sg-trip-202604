  </head>
  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <a class="brand" href="./index.html">行程</a>
        <nav class="nav" aria-label="主選單">
          <a href="./index.html">首頁</a>

          <a href="./links.html">連結</a>
        </nav>
      </div>
    </header>

    <main>
      <h1 class="page-title">地圖一覽（Google 我的地圖）</h1>
      <p class="lead">
        嵌入你已建立並分享的
        <strong>「新加坡飯店附近半日景點」</strong>（
        <a
          href="https://www.google.com/maps/d/edit?mid=1lL3qdmf4UXi1P9cRLF7yjPcPuzd3kZs&amp;usp=sharing"
          target="_blank"
          rel="noopener"
          >在 Google 開啟</a
        >）。之後若增刪地點，只要在 Google「我的地圖」裡編輯，本頁嵌入會一併更新（無須改網站程式）。若嵌入無法顯示，請用下方「全畫面檢視」。
      </p>

      <div class="map-toolbar">
        <a
          class="btn"
          href="https://www.google.com/maps/d/u/0/viewer?mid=1lL3qdmf4UXi1P9cRLF7yjPcPuzd3kZs&amp;hl=zh-TW"
          target="_blank"
          rel="noopener"
          >全畫面檢視（Google）</a
        >
        <a
          class="btn btn--secondary"
          href="https://www.google.com/maps/d/edit?mid=1lL3qdmf4UXi1P9cRLF7yjPcPuzd3kZs&amp;usp=sharing"
          target="_blank"
          rel="noopener"
          >編輯地圖</a
        >
        <a class="btn btn--secondary" href="./assets/singapore-pois.kml" download="singapore-pois.kml"
          >下載站內 KML（備份）</a
        >
      </div>

      <div class="my-maps-embed" aria-label="Google 我的地圖嵌入">
        <iframe
          title="新加坡飯店附近半日景點"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          src="https://www.google.com/maps/d/embed?mid=1lL3qdmf4UXi1P9cRLF7yjPcPuzd3kZs&amp;hl=zh-TW"
        ></iframe>
      </div>

      <div class="callout" style="margin-top: 1rem">
        <strong>若 iframe 空白：</strong>請先確認已登入 Google，或改用「全畫面檢視」。地圖分享權限需為「知道連結的任何人」等可檢視設定，嵌入才會正常。
      </div>
    </main>

    <footer class="site-footer">

  </body>
